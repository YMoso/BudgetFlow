services:
  db:
    image: postgres:16
    container_name: budgetflow_db
    environment:
      POSTGRES_USER: budgetflow_user
      POSTGRES_PASSWORD: budgetflow_password
      POSTGRES_DB: budgetflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetflow_user -d budgetflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: budgetflow_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: change-this-secret-key
      ALGORITHM: HS256
      DATABASE_URL: postgresql://budgetflow_user:budgetflow_password@db:5432/budgetflow_db
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data: